spring.application.name=backend

#Conexăo PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/syncmanager
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

#JPA / Hibernate
# "update": cria/atualiza tabelas automaticamente com base nas entidades.
# Para produçăo, troque por "validate" e use Flyway/Liquibase para migraçőes.
spring.jpa.hibernate.ddl-auto=update

# Dialeto explícito ? necessário para o Hibernate gerar SQL correto para PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Mostra o SQL gerado no console ? útil durante o desenvolvimento
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CRÍTICO para Hebraico: força UTF-8 na conexăo com o banco
spring.datasource.hikari.connection-init-sql=SET client_encoding TO 'UTF8'

#Upload de áudio
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
server.port=8080